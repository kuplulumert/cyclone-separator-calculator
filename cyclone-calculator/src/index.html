<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclone Parameter Calculator</title>
    <meta name="description" content="Advanced cyclone parameter calculator with DOE integration and parametric studies">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="./css/main.css" as="style">
    <link rel="preload" href="./js/main.js" as="script">
    
    <!-- Stylesheets -->
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link href="./css/main.css" rel="stylesheet">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-600">Loading Cyclone Calculator...</p>
        </div>
    </div>

    <!-- Main Application Container -->
    <div id="app" class="hidden">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center">
                        <h1 class="text-2xl font-bold text-gray-900">Cyclone Calculator</h1>
                        <span class="ml-3 px-2 py-1 text-xs bg-blue-100 text-blue-800 rounded-full">v2.0</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button id="settings-btn" class="p-2 text-gray-400 hover:text-gray-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="bg-white border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex space-x-8" id="main-navigation">
                    <button class="tab-button active" data-tab="single-calc-tab">Single Calculation</button>
                    <button class="tab-button" data-tab="param-study-tab">Parametric Study</button>
                    <button class="tab-button" data-tab="optimization-tab">Optimization</button>
                    <button class="tab-button" data-tab="doe-tab">🧪 DOE Integration</button>
                    <button class="tab-button" data-tab="ml-assistant-tab">🤖 AI Assistant</button>
                </div>
            </div>
        </nav>

        <!-- Tab Contents -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Single Calculation Tab -->
            <div id="single-calc-tab" class="tab-content active">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- Parametric Study Tab -->
            <div id="param-study-tab" class="tab-content hidden">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- Optimization Tab -->
            <div id="optimization-tab" class="tab-content hidden">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- DOE Integration Tab -->
            <div id="doe-tab" class="tab-content hidden">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- ML Assistant Tab -->
            <div id="ml-assistant-tab" class="tab-content hidden">
                <!-- Content will be loaded dynamically -->
            </div>
        </main>
    </div>

    <!-- Error Boundary -->
    <div id="error-boundary" class="hidden fixed inset-0 bg-red-50 z-40 flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-md">
            <div class="flex items-center mb-4">
                <div class="flex-shrink-0">
                    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h3 class="ml-3 text-lg font-medium text-red-800">Application Error</h3>
            </div>
            <p id="error-message" class="text-red-700 mb-4"></p>
            <button id="retry-btn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Retry
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
