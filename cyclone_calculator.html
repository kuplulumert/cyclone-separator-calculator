<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generalized Cyclone Parameter Calculator with Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: font-size 0.2s ease-in-out;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1.5fr 100px 85px; 
            gap: 0.5rem;
            align-items: center;
        }
        .input-field {
            width: 100%;
            padding: 0.5rem;
            border: 2px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            background-color: #ffffff;
        }
        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background-color: #fefefe;
        }
        .input-field:hover {
            border-color: #9ca3af;
            background-color: #fafafa;
        }
        .instant-input {
            border: 2px solid #e5e7eb !important;
            transition: all 0.2s ease-in-out;
            background-color: #ffffff;
        }
        .instant-input:focus {
            outline: none;
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background-color: #fefefe;
        }
        .instant-input:hover {
            border-color: #6b7280 !important;
            background-color: #f9fafb;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .data-table th, .data-table td {
            border: 1px solid #e2e8f0;
            padding: 0.75rem;
            text-align: center;
            transition: font-size 0.2s ease-in-out;
        }
        .data-table th {
            background-color: #f8fafc;
            font-weight: 600;
        }
        .control-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .control-btn {
            padding: 0.5rem; border-radius: 9999px; background-color: #e5e7eb;
        }
        .control-btn:hover { background-color: #d1d5db; }
        .layout-btn {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .layout-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
       
        /* SortableJS Styles */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .drag-handle {
            cursor: grab;
            color: #9ca3af;
        }
        .drag-handle:hover {
            color: #374151;
        }
        .sortable-card {
             min-height: 100px;
        }
        .sortable-ghost {
            opacity: 0.4;
            background: #c7d2fe;
            border: 2px dashed #4f46e5;
        }
        .sortable-column {
            min-height: 200px;
        }

        /* Tab Styles */
        .tab-button {
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            color: #6b7280;
        }
        .tab-button.active {
            color: #4f46e5;
            border-bottom-color: #4f46e5;
        }
        
        /* Instant Result Tab Styles */
        .result-card {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
            background: #f9fafb;
        }
        .result-card.full-width {
            grid-column: 1 / -1;
        }
        .result-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
            margin: 0;
        }
        .result-unit {
            font-size: 0.875rem;
            color: #6b7280;
            margin-left: 0.25rem;
        }
        .result-status {
            font-size: 1rem;
            color: #059669;
            margin: 0;
        }
        .result-status.error {
            color: #dc2626;
        }
        .chart-container {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            background: #f9fafb;
        }
        .chart-container-fixed {
            position: relative;
            height: 400px;
            width: 100%;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 md:p-8 max-w-screen-xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl sm:text-5xl font-bold text-gray-900">Generalized Cyclone Parameter Calculator</h1>
            <p class="mt-2 text-lg text-gray-600">Mert Küplülü</p>
        </header>

        <main>
            <div class="border-b border-gray-300 mb-8">
                <nav class="flex -mb-px">
                    <button class="tab-button active" data-tab="single-calc-tab">Single Calculation</button>
                    <button class="tab-button" data-tab="param-study-tab">Parametric Study</button>
                    <button class="tab-button" data-tab="optimization-tab">Optimization</button>
                    <button class="tab-button" data-tab="instant-result-tab">Instant Result</button>
                </nav>
            </div>

            <div id="single-calc-tab" class="tab-content active">
                <div id="main-grid-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                     <div id="sortable-column-1" class="sortable-column flex flex-col gap-8">
                         <div class="sortable-card bg-white p-6 sm:p-8 rounded-2xl shadow-lg">
                             <div id="calculator-form">
                                 <div class="card-header mb-6 border-b pb-3">
                                     <div class="flex items-center gap-4">
                                         <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 drag-handle" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                                         <h2 class="text-3xl font-semibold">Input Parameters</h2>
                                     </div>
                                     <div class="control-container">
                                         <div class="control-group">
                                             <button id="layout-1-col" class="layout-btn">1 Column</button>
                                             <button id="layout-2-col" class="layout-btn active">2 Columns</button>
                                         </div>
                                         <div class="control-group">
                                             <button class="font-down-btn control-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 000 2h6a1 1 0 100-2H7z" clip-rule="evenodd" /></svg></button>
                                             <span class="text-sm font-medium">Text Size</span>
                                             <button class="font-up-btn control-btn"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" /></svg></button>
                                         </div>
                                     </div>
                                 </div>
                                 <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                                     <div>
                                         <h3 class="text-lg font-semibold text-gray-700 mb-4">Cyclone Dimensions</h3>
                                         <div class="space-y-3">
                                             <div class="input-group"><label for="Dc_mm" class="input-label">Body Diameter (Dc)</label><input type="number" id="Dc_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="20"><span class="unit-text text-gray-500">mm</span></div>
                                             <div class="input-group"><label for="Lc_mm" class="input-label">Barrel Length (Lc)</label><input type="number" id="Lc_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="20"><span class="unit-text text-gray-500">mm</span></div>
                                             <div class="input-group"><label for="Zc_mm" class="input-label">Cone Length (Zc)</label><input type="number" id="Zc_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="50"><span class="unit-text text-gray-500">mm</span></div>
                                             <div class="input-group"><label for="De_mm" class="input-label">Outlet Diameter (De)</label><input type="number" id="De_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="10"><span class="unit-text text-gray-500">mm</span></div>
                                             <div class="input-group"><label for="Dd_mm" class="input-label">Dust Outlet (Dd)</label><input type="number" id="Dd_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="5"><span class="unit-text text-gray-500">mm</span></div>
                                             <div class="input-group"><label for="Bc_mm" class="input-label">Inlet Width (Bc)</label><input type="number" id="Bc_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="5"><span class="unit-text text-gray-500">mm</span></div>
                                             <div class="input-group"><label for="Hc_mm" class="input-label">Inlet Height (Hc)</label><input type="number" id="Hc_mm" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="9"><span class="unit-text text-gray-500">mm</span></div>
                                         </div>
                                     </div>
                                     <div>
                                         <h3 class="text-lg font-semibold text-gray-700 mb-4">Flow & Material Properties</h3>
                                         <div class="space-y-3">
                                             <div class="input-group"><label for="Q_lps" class="input-label">Inlet Flow Rate</label><input type="number" id="Q_lps" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="1"><span class="unit-text text-gray-500">L/s</span></div>
                                             <div class="input-group"><label for="mu" class="input-label">Gas Viscosity (μ)</label><input type="text" id="mu" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="1.81e-5"><span class="unit-text text-gray-500">Pa.s</span></div>
                                             <div class="input-group"><label for="rho_p" class="input-label">Particle Density (ρp)</label><input type="number" id="rho_p" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="2650"><span class="unit-text text-gray-500">kg/m³</span></div>
                                             <div class="input-group"><label for="rho_g" class="input-label">Gas Density (ρg)</label><input type="number" id="rho_g" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="1.225"><span class="unit-text text-gray-500">kg/m³</span></div>
                                             <div class="input-group"><label for="e_um" class="input-label">Roughness (e)</label><input type="number" id="e_um" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="45"><span class="unit-text text-gray-500">µm</span></div>
                                             <div class="input-group"><label for="initial_dust" class="input-label">Initial Dust Load</label><input type="number" id="initial_dust" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="200"><span class="unit-text text-gray-500">g</span></div>
                                             <div class="input-group"><label for="num_cyclones" class="input-label"># of Cyclones</label><input type="number" id="num_cyclones" class="input-field p-2 border border-gray-300 rounded-md shadow-sm" value="1"><span class="unit-text text-gray-500">units</span></div>
                                         </div>
                                     </div>
                                 </div>
                                                                 <!-- Main Action Area -->
                                <div class="mt-8 bg-gradient-to-r from-indigo-50 to-blue-50 p-6 rounded-2xl border border-indigo-200">
                                    <div class="flex flex-col items-center gap-4">
                                        <!-- Primary Actions Row -->
                                        <div class="flex items-center gap-4 flex-wrap justify-center">
                                            <input type="text" id="run-name-input" placeholder="Enter Run Name" class="p-3 border border-gray-300 rounded-lg shadow-sm w-64 text-center font-medium">
                                            <button id="calculate-btn" class="bg-indigo-600 text-white font-bold py-4 px-8 rounded-lg shadow-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all transform hover:scale-105 text-lg">
                                                🚀 Calculate
                                            </button>
                                            <button id="save-run-btn" class="bg-green-600 text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-green-700 transition-all transform hover:scale-105">
                                                💾 Save Run
                                            </button>
                                        </div>
                                        
                                        <!-- Quick Access Menu -->
                                        <div class="flex items-center gap-3">
                                            <div class="relative">
                                                <button id="quick-menu-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg border border-gray-300 transition-colors flex items-center gap-2">
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                                                    </svg>
                                                    Quick Actions
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                                    </svg>
                                                </button>
                                                <div id="quick-menu-dropdown" class="hidden absolute top-full left-0 mt-2 w-64 bg-white rounded-lg shadow-xl border border-gray-200 z-50">
                                                    <div class="p-2">
                                                        <div class="px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b border-gray-100">File Operations</div>
                                                        <button id="save-to-file-btn" class="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 rounded-md flex items-center gap-2 text-gray-700">
                                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3-3m0 0l-3 3m3-3v12" />
                                                            </svg>
                                                            Save Project to File
                                                        </button>
                                                        <label for="load-from-file-input" class="w-full text-left px-3 py-2 text-sm hover:bg-orange-50 rounded-md flex items-center gap-2 text-gray-700 cursor-pointer">
                                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                                                            </svg>
                                                            Load Project from File
                                                        </label>
                                                        <input type="file" id="load-from-file-input" accept=".json" style="display: none;">
                                                        <button id="export-all-runs-btn" class="w-full text-left px-3 py-2 text-sm hover:bg-purple-50 rounded-md flex items-center gap-2 text-gray-700">
                                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                                            </svg>
                                                            Export Analysis Report
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <!-- Parameters History Toggle -->
                                            <button id="history-toggle-btn" class="bg-amber-100 hover:bg-amber-200 text-amber-800 font-medium py-2 px-4 rounded-lg border border-amber-300 transition-colors flex items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                                Parameter History
                                                <span id="history-count" class="bg-amber-200 text-amber-900 px-2 py-1 rounded-full text-xs font-bold">0</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
